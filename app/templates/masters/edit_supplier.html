{% extends "base.html" %}
{% block title %}Edit Supplier - SKSS-MIS{% endblock %}
{% block content %}
<div class="page-header">
  <h2><i class="bi bi-pencil me-2"></i>Edit Supplier</h2>
</div>
<form method="post" class="card card-body col-md-6">
  <div class="mb-3">
    <label class="form-label">Supplier Name</label>
    <input type="text" name="name" class="form-control" value="{{ supplier.name }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Opening Balance</label>
    <input type="number" step="0.01" name="opening_balance" class="form-control" value="{{ supplier.opening_balance or 0 }}">
    <small class="text-muted">Amount owed to supplier at go-live.</small>
  </div>
  <div class="mb-3">
    <label class="form-label">Contact</label>
    <input type="text" name="contact" class="form-control" value="{{ supplier.contact or '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" name="email" class="form-control" value="{{ supplier.email or '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Address</label>
    <textarea name="address" class="form-control" rows="2">{{ supplier.address or '' }}</textarea>
  </div>
  <div class="mb-3">
    <label class="form-label">Category</label>
    <select name="category_id" class="form-select">
      <option value="">-- None --</option>
      {% for cat in categories %}
      <option value="{{ cat.id }}" {% if supplier.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
      {% endfor %}
    </select>
  </div>
  <button class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save</button>
  <a href="{{ url_for('masters.suppliers') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
